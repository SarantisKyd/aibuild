openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: jobs
    description: Job board operations
  - name: bids
    description: Bid operations
  - name: tools
    description: Tool marketplace operations
  - name: builders
    description: Builder profile and subscription operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all jobs
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [all, web, automation, agent, data]
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Post a new job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "201":
          description: Created job with Stripe checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/fund:
    post:
      operationId: fundJob
      tags: [jobs]
      summary: Create a Stripe Checkout session to fund a job in escrow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stripe Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundJobResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/feature:
    post:
      operationId: featureJob
      tags: [jobs]
      summary: Create a Stripe Checkout session to feature a job listing for $15
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stripe Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureCheckoutResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/bids:
    get:
      operationId: listJobBids
      tags: [bids]
      summary: List bids for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of bids
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bid"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: submitBid
      tags: [bids]
      summary: Submit a bid on a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBidBody"
      responses:
        "201":
          description: Bid submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bid"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/bids/{bidId}/accept:
    post:
      operationId: acceptBid
      tags: [bids]
      summary: Accept a bid on a job, rejecting all others
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: bidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job or bid not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/deliver:
    post:
      operationId: deliverJob
      tags: [jobs]
      summary: Submit completed work for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliverJobBody"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/release:
    post:
      operationId: releaseJobPayment
      tags: [jobs]
      summary: Approve delivered work and release payment to the builder via Stripe Transfer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/revision:
    post:
      operationId: requestRevision
      tags: [jobs]
      summary: Request a revision on delivered work
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevisionBody"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/dispute:
    post:
      operationId: disputeJob
      tags: [jobs]
      summary: Open a dispute on a delivered job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeBody"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/cancel:
    post:
      operationId: cancelJob
      tags: [jobs]
      summary: Cancel a job and refund the client before a builder is accepted
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job cancelled and refunded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelJobResponse"
        "400":
          description: Job cannot be cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/cancelled-jobs:
    get:
      operationId: listCancelledJobs
      tags: [admin]
      summary: List all cancelled jobs
      responses:
        "200":
          description: List of cancelled jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /admin/disputed-jobs:
    get:
      operationId: listDisputedJobs
      tags: [admin]
      summary: List all jobs currently under dispute
      responses:
        "200":
          description: List of disputed jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /builders/{email}:
    get:
      operationId: getBuilder
      tags: [builders]
      summary: Get a builder profile by email
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Builder profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Builder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /builders/subscribe:
    post:
      operationId: subscribBuilder
      tags: [builders]
      summary: Create a Stripe Checkout subscription session for $9/month verified builder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuilderSubscribeBody"
      responses:
        "200":
          description: Stripe Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuilderSubscribeResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools:
    get:
      operationId: listTools
      tags: [tools]
      summary: List all tools
      responses:
        "200":
          description: List of tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tool"
    post:
      operationId: createTool
      tags: [tools]
      summary: Create a tool listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateToolBody"
      responses:
        "201":
          description: Tool created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tools/{id}/buy:
    post:
      operationId: buyTool
      tags: [tools]
      summary: Create a Stripe Checkout session to buy or subscribe to a tool
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolBuyResponse"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AcceptedBid:
      type: object
      properties:
        id:
          type: integer
        price:
          type: integer
        deliveryTime:
          type: string
        coverNote:
          type: string
        builderEmail:
          type: string
      required:
        - id
        - price
        - deliveryTime
        - coverNote
        - builderEmail

    Job:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        budget:
          type: integer
        deadline:
          type: string
        category:
          type: string
        skills:
          type: array
          items:
            type: string
        urgent:
          type: boolean
        isNew:
          type: boolean
        bids:
          type: integer
        featured:
          type: boolean
        status:
          type: string
        clientEmail:
          type: string
        acceptedBid:
          $ref: "#/components/schemas/AcceptedBid"
          nullable: true
        deliveryNote:
          type: string
          nullable: true
        deliveryLink:
          type: string
          nullable: true
        revisionNote:
          type: string
          nullable: true
        disputeReason:
          type: string
          nullable: true
        stripeSessionId:
          type: string
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - budget
        - deadline
        - category
        - skills
        - urgent
        - isNew
        - bids
        - featured
        - status
        - clientEmail
        - createdAt

    CreateJobResponse:
      type: object
      properties:
        job:
          $ref: "#/components/schemas/Job"
        checkoutUrl:
          type: string
          nullable: true
      required:
        - job

    FundJobResponse:
      type: object
      properties:
        checkoutUrl:
          type: string
      required:
        - checkoutUrl

    CreateJobBody:
      type: object
      properties:
        title:
          type: string
          minLength: 3
        description:
          type: string
          minLength: 10
        budget:
          type: integer
          minimum: 10
        deadline:
          type: string
        category:
          type: string
          enum: [web, automation, agent, data]
        skills:
          type: array
          items:
            type: string
        urgent:
          type: boolean
        isNew:
          type: boolean
        clientEmail:
          type: string
          format: email
      required:
        - title
        - description
        - budget
        - deadline
        - category
        - skills
        - clientEmail

    Bid:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        price:
          type: integer
        deliveryTime:
          type: string
        coverNote:
          type: string
        builderEmail:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - jobId
        - price
        - deliveryTime
        - coverNote
        - builderEmail
        - status
        - createdAt

    CreateBidBody:
      type: object
      properties:
        price:
          type: integer
          minimum: 1
        deliveryTime:
          type: string
        coverNote:
          type: string
          minLength: 10
        builderEmail:
          type: string
          format: email
      required:
        - price
        - deliveryTime
        - coverNote
        - builderEmail

    DeliverJobBody:
      type: object
      properties:
        builderEmail:
          type: string
          format: email
        deliveryNote:
          type: string
          minLength: 1
        deliveryLink:
          type: string
          minLength: 1
      required:
        - builderEmail
        - deliveryNote
        - deliveryLink

    ReleaseResponse:
      type: object
      properties:
        success:
          type: boolean
        builderPaid:
          type: number
        platformFee:
          type: number
      required:
        - success
        - builderPaid
        - platformFee

    CancelJobResponse:
      type: object
      properties:
        success:
          type: boolean
        refundAmount:
          type: integer
      required:
        - success
        - refundAmount

    RevisionBody:
      type: object
      properties:
        revisionNote:
          type: string
          minLength: 1
      required:
        - revisionNote

    DisputeBody:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
      required:
        - reason

    Tool:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        emoji:
          type: string
        description:
          type: string
        price:
          type: string
        rating:
          type: string
        reviews:
          type: integer
        bgColor:
          type: string
        category:
          type: string
        priceAmount:
          type: integer
          nullable: true
        billingType:
          type: string
          nullable: true
        builderEmail:
          type: string
          nullable: true
        sales:
          type: integer
        status:
          type: string
        toolUrl:
          type: string
          nullable: true
        accessInstructions:
          type: string
          nullable: true
        targetAudience:
          type: string
          nullable: true
        rejectionReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - emoji
        - description
        - price
        - rating
        - reviews
        - bgColor
        - category
        - sales
        - status
        - createdAt

    CreateToolBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: integer
          description: Price in cents (e.g. 999 = $9.99)
        billingType:
          type: string
          enum: [one_off, monthly]
        builderEmail:
          type: string
          format: email
        emoji:
          type: string
        toolUrl:
          type: string
        accessInstructions:
          type: string
        targetAudience:
          type: string
      required:
        - name
        - description
        - price
        - billingType
        - builderEmail
        - emoji
        - accessInstructions
        - targetAudience

    ToolBuyResponse:
      type: object
      properties:
        checkoutUrl:
          type: string
      required:
        - checkoutUrl

    Builder:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        verified:
          type: boolean
        stripeCustomerId:
          type: string
          nullable: true
        stripeSubscriptionId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - verified
        - createdAt

    BuilderSubscribeBody:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
      required:
        - email

    BuilderSubscribeResponse:
      type: object
      properties:
        checkoutUrl:
          type: string
      required:
        - checkoutUrl

    FeatureCheckoutResponse:
      type: object
      properties:
        checkoutUrl:
          type: string
      required:
        - checkoutUrl

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
